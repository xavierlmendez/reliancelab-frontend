<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>

  <!-- "R" letterform -->
  <g fill="none" stroke="#646cff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Vertical stem -->
    <line x1="9" y1="7" x2="9" y2="25"/>
    <!-- Top arc of R (spine to bump) -->
    <path d="M9 7 h7 a5 5 0 0 1 0 10 H9"/>
    <!-- Leg of R -->
    <line x1="16" y1="17" x2="23" y2="25"/>
  </g>

  <!-- Accent dot bottom-right -->
  <circle cx="23" cy="25" r="1.5" fill="#63ffa9"/>
</svg>
